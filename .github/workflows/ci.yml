name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════
  # Lint — runs once, fast
  # ════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: dev

      - name: Check formatting and lint
        run: pixi run -e dev lint-check

  # ════════════════════════════════════════════════════════════
  # Test — matrix across Python versions
  # ════════════════════════════════════════════════════════════
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
            pixi-env: py311
            os: ubuntu-latest
          - python: "3.12"
            pixi-env: py312
            os: ubuntu-latest
          - python: "3.13"
            pixi-env: py313
            os: ubuntu-latest
          - python: "3.12"
            pixi-env: py312
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: ${{ matrix.pixi-env }}

      - name: Run tests
        run: pixi run -e ${{ matrix.pixi-env }} test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.pixi-env }}-${{ matrix.os }}
          path: |
            build/reports/pytest.html
            build/reports/pytest.xunit.xml
            build/reports/coverage.xml
            build/reports/htmlcov/
          retention-days: 14

  # ════════════════════════════════════════════════════════════
  # Docs — build Sphinx + deploy to GitHub Pages
  # ════════════════════════════════════════════════════════════
  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: dev

      - name: Build documentation
        run: pixi run -e dev build_html_docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: build/docs/
          retention-days: 14

      # Only deploy to Pages on push to main (not PRs)
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deploy
        uses: actions/deploy-pages@v4

  # ════════════════════════════════════════════════════════════
  # Build — sdist + wheel (runs on every push/PR)
  # ════════════════════════════════════════════════════════════
  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install flit build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import holonic; print(f'holonic {holonic.__version__}')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ════════════════════════════════════════════════════════════
  # Publish — push to PyPI on tagged releases
  # ════════════════════════════════════════════════════════════
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, docs]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/holonic

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing — configure at:
        # https://pypi.org/manage/project/holonic/settings/publishing/