# Dependencies installed into the JupyterLite pyodide kernel.
# These wheels must be pure-python or have pyodide builds available.
#
# holonic is unpinned here because JupyterLite pulls the latest from
# PyPI at build time. Rebuild the JupyterLite site after each holonic
# release to pick up changes.
name: jupyterlite-env
channels:
  - https://repo.prefix.dev/emscripten-forge
  - https://repo.prefix.dev/conda-forge
dependencies:
  - pip
  - pip:
    - holonic
  - rdflib
  - pyshacl
  - pydantic>=2.0.0
  - jinja2