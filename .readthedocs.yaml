# Read the Docs configuration for holonic
#
# Builds the Sphinx documentation and embeds a JupyterLite static
# site under `/jupyterlite/` so readers can try the example notebooks
# in their browser without installing anything.
#
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    # Before Sphinx runs, build the JupyterLite site into the Sphinx
    # _static tree so that html pages under the docs build can link
    # to /_static/jupyterlite/index.html. Requirements live in
    # jupyterlite/requirements.txt.
    pre_build:
      - pip install "jupyterlite-core>=0.4" "jupyterlite-pyodide-kernel>=0.4" "jupyterlab>=4,<5" "notebook>=7,<8"
      - python scripts/sync_notebooks_to_jlite.py
      - cd jupyterlite && jupyter lite build --output-dir ../docs/source/_static/jupyterlite

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
