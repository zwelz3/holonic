[workspace]
name = "holonic"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64"]

# ──────────────────────────────────────────────────────────
# Environment layout
#
# pixi features are composable units of (dependencies | tasks).
# They assemble into environments. Two everyday environments:
#
#   dev   — the default for development. Library + lint + test +
#           docs + jupyterlite + lab. Does NOT pull specl.
#   spec  — layered over a subset of dev with specl pinned
#           from git. Use when working on docs/SPEC.md:
#             pixi run -e spec spec-validate
#             pixi run -e spec spec-score
#             pixi run -e spec spec-badge
#
# Specl is kept out of dev so day-to-day work doesn't pull
# a git dependency on every install. It's optional infrastructure
# for spec-driven development, not required for the library itself.
# ──────────────────────────────────────────────────────────

[pypi-dependencies]
holonic = { path=".", editable=true}
yfiles-jupyter-graphs = ">=1.7.0"
sphinx_autodoc_typehints = "*"
sphinx_rtd_theme = "*"

[dependencies]
python = ">=3.11"
pip = ">=25"
polars = "*"
rdflib = ">=7.0.0"
pyshacl = ">=0.26.0"
pydantic =  ">=2.0.0"
jinja2 = ">=3.1.0"
python-docx = ">=1.0.0"
jupytext = "*"


# generic tasks ###########################################
[tasks]

[tasks.lint-fix]
description = """Run all lint fixers"""
depends-on = ["clean-notebooks", "fix-pyproject", "fix-ssort", "format-ruff", "fix-ruff"]
cmd = "echo 🚧"

# TODO: Add mypy back to lint checker
[tasks.lint-check]
description = """Run all lint checkers"""
depends-on = ["check-pyproject", "check-ssort", "check-ruff", "check-notebooks"]
cmd = "echo 🔎"

[feature.tasks-test.tasks]

[feature.tasks-test.tasks.test]
cmd = "pytest"

[feature.tasks-lint.tasks.clean-notebooks]
description = """Strip all outputs from notebooks in place. Runs first in
    lint-fix so any stray committed cell outputs are removed before the
    Python formatters touch anything."""
cmd = "jupyter nbconvert --clear-output --inplace notebooks/*.ipynb"
inputs = ["notebooks/*.ipynb"]

[feature.tasks-lint.tasks.check-notebooks]
description = """Fail if any notebook has cell outputs. Uses --stdout to a
    throwaway comparison instead of modifying the files. Notebook outputs
    should never be committed; they bloat diffs and leak data."""
cmd = "python scripts/check_notebooks.py"
inputs = ["notebooks/*.ipynb", "scripts/check_notebooks.py"]

[feature.tasks-lint.tasks.fix-pyproject]
cmd = "pyproject-fmt pyproject.toml"
inputs = ["pyproject.toml"]

[feature.tasks-lint.tasks.fix-ssort]
cmd = "ssort src/**/*.py"
inputs = ["src/**/*.py"]

[feature.tasks-lint.tasks.format-ruff]
cmd = "ruff format src src/**/*.py"
inputs = ["src/**/*.py"]

[feature.tasks-lint.tasks.fix-ruff]
cmd = "ruff check src/ --fix"
inputs = ["src/**/*.py"]

[feature.tasks-lint.tasks.mypy]
cmd = "mypy --show-error-codes -p holonic"
inputs = ["src/**/*.py"]

[feature.tasks-lint.tasks.check-pyproject]
cmd = "pyproject-fmt pyproject.toml --check"
inputs = ["pyproject.toml"]

[feature.tasks-lint.tasks.check-ssort]
cmd = "ssort --check src/**/*.py"
inputs = ["src/**/*.py"]

[feature.tasks-lint.tasks.check-ruff]
cmd = "ruff check src/"
inputs = ["src/**/*.py"]

# Spec-driven development via specl #################
# Translates docs/SPEC.md to RDF, validates against SHACL shapes shipped
# with specl, and reports a maturity score (0-100%). The score is the
# fraction of ekga:Requirement instances with zero SHACL violations or
# warnings. Useful as a CI gate and as a README badge.
[feature.tasks-spec.tasks.spec-translate]
description = "Translate docs/SPEC.md to docs/SPEC.ttl via specl"
cmd = "specl-translate docs/SPEC.md docs/SPEC.ttl"
inputs = ["docs/SPEC.md"]
outputs = ["docs/SPEC.ttl"]

[feature.tasks-spec.tasks.spec-validate]
description = "Validate docs/SPEC.ttl against specl shapes with explanations"
cmd = "specl-validate validate docs/SPEC.ttl $(python -c 'import specl, pathlib; print(pathlib.Path(specl.__file__).parent / \"shapes.ttl\")') --explain"
depends-on = ["spec-translate"]

[feature.tasks-spec.tasks.spec-score]
description = """Compute the spec maturity score (0-100%). Fraction of
    requirements without SHACL violations or warnings. Embed the SVG
    badge in the README by running `spec-badge` and referencing the
    generated file. See docs/SPEC.md for the embed snippet."""
cmd = "specl-validate score docs/SPEC.ttl $(python -c 'import specl, pathlib; print(pathlib.Path(specl.__file__).parent / \"shapes.ttl\")')"
depends-on = ["spec-translate"]

[feature.tasks-spec.tasks.spec-badge]
description = "Generate a spec-maturity SVG badge at build/spec-badge.svg"
cmd = "specl-validate badge docs/SPEC.ttl $(python -c 'import specl, pathlib; print(pathlib.Path(specl.__file__).parent / \"shapes.ttl\")') --out build/spec-badge.svg"
depends-on = ["spec-translate"]

[feature.tasks-docs.tasks.autogen]
description = "Autobuild the code documentation"
cmd = "sphinx-apidoc -f -o ./docs/source/auto ./src/holonic ./src/holonic/test"

[feature.tasks-docs.tasks.build_html_docs]
description = "Build the documentation"
cmd = "sphinx-build -a -E -b html ./docs/source ./build/docs"
depends-on = ["autogen"]

[feature.tasks-start.tasks.first]
description = "Set up and test"
depends-on = ["lint-check", "test", "build_html_docs"]

[feature.tasks-jlite.tasks.build_jl]
description = "Create jupyterlite page"
cmd = "jupyter lite build --contents jupyterlite/content  --output-dir build/docs/demo"

[feature.tasks-lab.tasks.serve]
description = "Serve local jupyterlab"
cmd = "jupyter lab"


[environments.dev]
features = [
  "deps-lint",
  "deps-test",
  "deps-docs",
  "deps-jlite",
  "deps-lab",
  "tasks-lint",
  "tasks-test",
  "tasks-docs",
  "tasks-start",
  "tasks-jlite",
  "tasks-lab",
]

# Specl environment: layered on top of dev. Only resolves the
# specl git dependency when this environment is materialized.
# Usage: `pixi run -e spec spec-validate`. Add `--frozen` if you want
# to skip re-resolving on every invocation.
[environments.spec]
features = [
  "deps-lint",
  "deps-test",
  "deps-docs",
  "deps-spec",
  "tasks-lint",
  "tasks-test",
  "tasks-spec",
]


[environments.py311]
features  = [
  "py311",
  "deps-lint",
  "deps-test",
  "deps-docs",
  "tasks-lint",
  "tasks-test",
]

[environments.py312]
features  = [
  "py312",
  "deps-lint",
  "deps-test",
  "deps-docs",
  "deps-jlite",
  "tasks-lint",
  "tasks-test",
  "tasks-docs",
  "tasks-jlite",
]

[environments.py313]
features  = [
  "py313",
  "deps-lint",
  "deps-test",
  "deps-docs",
  "tasks-lint",
  "tasks-test",
]

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.deps-lint.dependencies]
mypy = "*"
pyproject-fmt = ">=2.5"
ruff = ">=0.6"
ssort = ">=0.12"
nbconvert = "*"
nbformat = "*"

[feature.deps-spec.pypi-dependencies]
# specl: RDF-native spec validation. Not on PyPI yet; pin to git URL
# or local path. Replace with a PyPI version once specl ships there.
specl = { git = "https://github.com/zwelz3/specl.git" }

[feature.deps-test.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-html = "*"
pytest-xdist = "*"
pytest-json-report = "*"

[feature.deps-docs.dependencies]
myst-parser = "*"
pydata-sphinx-theme = "*"
sphinx = ">=7"

[feature.deps-lab.dependencies]
jupyterlab = ">=4,<5"
ipydatagrid = "*"

[feature.deps-jlite.dependencies]
jupyterlite-core = "*"
jupyterlite-pyodide-kernel = "*"
jupyterlab = ">=4,<5"
voici = "*"